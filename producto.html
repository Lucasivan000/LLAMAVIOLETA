<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Llama Violeta | Carteras</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/productosSlider.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="nav-container">
            <div class="brand">
                <img src="./assets/logo.jpg" alt="Llama Violeta Logo">
                <span>Llama Violeta</span>
            </div>

            <button class="menu-toggle" aria-label="Abrir menú">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="nav-links">
                <a href="./index.html#inicio">Inicio</a>
                <a href="#contacto">Contacto</a>
            </nav>
        </div>
    </header>


    <main>
        <div id="producto-detalle"></div>
    </main>

    <section class="contact" id="contacto">
        <h2>Contacto</h2>

        <div class="contact-box">
            <p>
                <img src="./assets/iconowp.webp" alt="WhatsApp" class="contact-icon">
                <a href="https://wa.me/5491150413838" target="_blank" rel="noopener">+54 9 1150413838</a>
            </p>
            <p>
                <img src="./assets/iconoig.webp" alt="Instagram" class="contact-icon">
                <a href="https://www.instagram.com/llamavioletamacrame" target="_blank" rel="noopener">@llamavioleta</a>
            </p>
        </div>
    </section>

    <footer class="footer">
        <p>© 2026 Llama Violeta – Todos los derechos reservados</p>
    </footer>

    <script src="./javaScript/productos.js"></script>
    <script>
        console.log("JS INLINE CARGADO");

        document.addEventListener('DOMContentLoaded', () => {
            const menuToggle = document.querySelector('.menu-toggle');
            const navLinks = document.querySelector('.nav-links');

            if (!menuToggle || !navLinks) {
                console.warn("No se encontraron elementos del menú");
                return;
            }

            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                console.log("toggle menú");
            });

            navLinks.addEventListener('click', (e) => {
                const link = e.target.closest('a');
                if (!link) return;

                navLinks.classList.remove('active');
                console.log("link click", link.href);
                // ⚠️ NO preventDefault → navega normal
            });
        });
    </script>
</body>

</html>
